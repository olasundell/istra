interface:
  display_name: "Istra Project Memory"
  short_description: "Maintain durable operational project memory"
  default_prompt: "Use $istra-project-memory to resolve this checkout, reconcile requirements, work and evidence, and record an authoritative checkpoint after substantive changes."
dependencies:
  tools:
    - type: "mcp"
      value: "istra"
      description: "Istra local project-memory MCP server"
      transport: "stdio"
policy:
  allow_implicit_invocation: true
