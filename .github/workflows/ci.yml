name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Ensure the tracked plugin bundle matches its source
        run: git diff --exit-code -- plugins/istra/dist
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  container:
    runs-on: ubuntu-latest
    needs: verify
    env:
      POSTGRES_PASSWORD: istra-ci-only
      ISTRA_COMPOSE_DATABASE_URL: postgresql://istra:istra-ci-only@postgres:5432/istra
    steps:
      - uses: actions/checkout@v7
      - name: Build and start the production service
        run: docker compose up --build --detach --wait
      - name: Smoke-test the loopback service
        run: curl --noproxy '*' --fail --show-error http://127.0.0.1:4317/api/v1/ready
      - name: Show container logs
        if: failure()
        run: docker compose logs
      - name: Stop the production service
        if: always()
        run: docker compose down --volumes
